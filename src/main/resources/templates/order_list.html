<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order list</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" th:href="@{/static/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>

    <script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</head>

<!--<div class="container">-->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <div class="navbar-nav">
            <a href="/offers" class="nav-link nav-item">Return</a>
        </div>
    </div>
</nav>

<div class="container">
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">Numer zamówienia</th>
            <th scope="col">Imię</th>
            <th scope="col">Nazwisko</th>
            <th scope="col">Miasto</th>
            <th scope="col">E-mail</th>
            <th scope="col">Akcja</th>
            <th scope="col">Akcja usuń</th>

        </tr>
        </thead>
        <tbody>
        <tr th:each="customer: ${customers}">
            <td th:text="${customer.idCustomer}">idCustomer</td>
            <td th:text="${customer.firstName}"></td>
            <td th:text="${customer.lastName}"></td>
            <td th:text="${customer.city}"></td>
            <td th:text="${customer.email}"></td>
<!--            <td th:text="${numberRandomBookId}"></td>-->
            <td><a th:href="${'/order/details?id='+customer.idCustomer}">Order details</a></td>
            <td><a th:href="${'/order/delete/'+customer.idCustomer}">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</html>
