<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book order</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" th:href="@{/static/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>

    <script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</head>

<body>
<!--<div class="container">-->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <div class="navbar-nav">
            <a href="/offers" class="nav-link nav-item">Return</a>
        </div>
    </div>
</nav>

<!--<div class="jumbotron jumbotron-fluid bg-success text-white text-center">-->
<div class="jumbotron jumbotron-fluid bg-light text-white text-center">
    <div class="container text-warning">
        <h1>Please enter your order number</h1>
    </div>
</div>

<form th:object="${book}" th:action="@{/book/order}" th:method="post">
    <div class="container pt-2">
        <div class="row">

            <div class="form-group">
                <label class="control-label">order number</label>
                <input type="text" class="form-control" th:field="*{idBook}"/>
                <p class="text-danger" th:if="${#fields.hasErrors('idBook')}" th:errors="*{idBook}"/>
            </div>

            <div class="container">
                <button class="btn btn-warning text-white">Continue</button>

            </div>

        </div>
    </div>
</form>
</body>
</html>
