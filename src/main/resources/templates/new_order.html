        <h1>Enter your order details</h1>

<form th:object="${customer}" th:action="@{/new/order}" th:method="post">
    <div class="container pt-2">
        <div class="row">

            <div class="form-group col-md-6">
                <label class="control-label">first name</label>
                <input type="text" class="form-control" th:field="*{firstName}"/>
                <p class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"/>
            </div>

            <div class="form-group col-md-6">
                <label class="control-label">last name</label>
                <input type="text" class="form-control" th:field="*{lastName}"/>
                <p class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"/>
            </div>

            <div class="form-group col-md-6">
                <label class="control-label">city</label>
                <input type="text" class="form-control" th:field="*{city}"/>
                <p class="text-danger" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"/>
            </div>

            <div class="form-group col-md-6">
                <label class="control-label">e-mail</label>
                <input type="text" class="form-control" th:field="*{email}"/>
                <p class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"/>

            </div>
